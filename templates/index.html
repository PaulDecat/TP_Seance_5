<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Import CSV</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="container">
    <h1>Importer un fichier CSV</h1>

    <form id="upload-form">
      <input id="file-input" type="file" name="file" accept=".csv,text/csv" required />
      <button id="submit-btn" type="submit">Uploader</button>
    </form>

    <p id="message" class="message"></p>

    <section class="chart-section">
      <div class="chart-header">
        <h2>Repartition des clients par segment</h2>
        <button id="refresh-chart-btn" type="button">Actualiser le graphique</button>
      </div>
      <p id="chart-message" class="chart-message"></p>
      <canvas id="segment-chart" width="580" height="320" aria-label="Graphique des segments clients"></canvas>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
