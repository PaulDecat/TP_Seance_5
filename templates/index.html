<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Import CSV</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="container">
    <h1>Importer un fichier CSV</h1>

    <section class="risk-card" aria-live="polite">
      <h2>Clients a risque</h2>
      <p class="risk-value"><span id="risk-count">-</span> / <span id="total-count">-</span></p>
      <p class="risk-caption">Le nombre se met a jour automatiquement apres chaque import.</p>
    </section>

    <form id="upload-form">
      <input id="file-input" type="file" name="file" accept=".csv,text/csv" required />
      <button id="submit-btn" type="submit">Uploader</button>
    </form>

    <p id="message" class="message"></p>

    <section class="recommendations-section" aria-live="polite">
      <h2>Recommandations</h2>
      <div id="recommendations-list" class="recommendations-list"></div>
    </section>

    <section class="actions-section" aria-live="polite">
      <h2>Actions creees</h2>
      <ul id="actions-list" class="actions-list"></ul>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
